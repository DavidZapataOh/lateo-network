<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LATEO — The World</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #040406;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        /* Depth, not emptiness: a barely-there warm-dark heart falling into true night at the
           edges. Static, GPU-composited — the render loop only clears to transparent above it. */
        background: radial-gradient(ellipse at center, #0b0a11 0%, #070609 55%, #040406 100%);
      }
    </style>
  </head>
  <body>
    <canvas id="world"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LATEO — The World</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #040406;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        /* Depth, not emptiness: a barely-there warm-dark heart falling into true night at the
           edges. Static, GPU-composited — the render loop only clears to transparent above it. */
        background: radial-gradient(ellipse at center, #0b0a11 0%, #070609 55%, #040406 100%);
      }
      /* The read-model chrome: quiet, warm-dark, never louder than the beings. */
      #stats {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        gap: 1.4em;
        justify-content: center;
        padding: 10px 16px;
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #b8a992;
        background: rgba(7, 6, 9, 0.82);
        border-top: 1px solid #241d18;
      }
      #stats b {
        color: #ffe9b0;
        font-weight: 600;
      }
      #stats .organic b {
        color: #7df9c4;
      }
      #panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 42px; /* the stats bar stays fully readable under an open panel */
        width: min(400px, 92vw);
        overflow-y: auto;
        padding: 18px 20px 60px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #cfc0a8;
        background: rgba(10, 9, 14, 0.94);
        border-left: 1px solid #241d18;
        display: none;
      }
      #panel.open {
        display: block;
      }
      #panel h2 {
        margin: 0 0 4px;
        font-size: 14px;
        color: #ffe9b0;
      }
      #panel a {
        color: #f2a63b;
        word-break: break-all;
      }
      #panel .close {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        color: #8e7f6a;
        background: none;
        border: none;
        font-size: 18px;
      }
      #panel table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      #panel td {
        padding: 3px 4px;
        border-bottom: 1px solid #1a1512;
        vertical-align: top;
      }
      #panel .muted {
        color: #6f6350;
      }
      #panel .ok {
        color: #7df9c4;
      }
      #panel .warn {
        color: #e5602a;
      }
    </style>
  </head>
  <body>
    <canvas id="world"></canvas>
    <div id="stats"></div>
    <aside id="panel"></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
